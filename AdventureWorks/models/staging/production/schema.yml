        description: Identificador do modelo do produto.
        tests:
          - not_null

      - name: product_description_id
        description: Identificador da descrição do produto.
        tests:
          - not_null

      - name: culture_id
        description: Identificador da cultura (idioma) da descrição.

      - name: modified_date
        description: Data da última atualização do registro.