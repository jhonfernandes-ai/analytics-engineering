    columns:

      - name: product_model_id
        description: Identificador único do modelo do produto.
        tests:
          - unique
          - not_null

      - name: product_model_name
        description: Nome do modelo do produto.

      - name: catalog_description
        description: Descrição do catálogo do modelo do produto.

      - name: instructions
        description: Instruções de fabricação do modelo do produto.

      - name: row_guid
        description: Identificador global único do registro.

