version: 2

models:

  # ==========================================================
  # stg_production__product
  # ==========================================================
  - name: stg_production__product

    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      Product da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: product_id
        description: Identificador único do produto.
        tests:
          - unique
          - not_null

      - name: product_name
        description: Nome do produto.

      - name: product_number
        description: Código do produto.

      - name: make_flag
        description: Indica se o produto é fabricado internamente.

      - name: finished_goods_flag
        description: Indica se o produto é um produto acabado.

      - name: color
        description: Cor do produto.

      - name: size
        description: Tamanho do produto.

      - name: size_unit_measure_code
        description: Unidade de medida do tamanho.

      - name: weight_unit_measure_code
        description: Unidade de medida do peso.

      - name: weight
        description: Peso do produto.

      - name: safety_stock_level
        description: Nível mínimo de estoque de segurança.

      - name: reorder_point
        description: Ponto de reposição do estoque.

      - name: standard_cost
        description: Custo padrão do produto.

      - name: list_price
        description: Preço de lista do produto.

      - name: days_to_manufacture
        description: Quantidade de dias necessários para fabricar o produto.

      - name: product_line
        description: Linha de produtos.

      - name: product_class
        description: Classe do produto.

      - name: style
        description: Estilo do produto.

      - name: product_subcategory_id
        description: Identificador da subcategoria do produto.

      - name: product_model_id
        description: Identificador do modelo do produto.

      - name: sell_start_date
        description: Data de início da comercialização.

      - name: sell_end_date
        description: Data de encerramento da comercialização.

      - name: discontinued_date
        description: Data de descontinuação do produto.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_production__product_subcategory
  # ==========================================================
  - name: stg_production__product_subcategory

    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      ProductSubcategory da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: product_subcategory_id
        description: Identificador único da subcategoria do produto.
        tests:
          - unique
          - not_null

      - name: product_category_id
        description: Identificador da categoria à qual a subcategoria pertence.
        tests:
          - not_null

      - name: product_subcategory_name
        description: Nome da subcategoria do produto.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

