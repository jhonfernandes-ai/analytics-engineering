version: 2

models:

  - name: stg_sales__order_header
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      SalesOrderHeader da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: sales_order_id
        description: Identificador único do pedido de venda.
        tests:
          - unique
          - not_null

      - name: revision_number
        description: Número da revisão do pedido.

      - name: sales_order_number
        description: Número público do pedido de venda.

      - name: purchase_order_number
        description: Número do pedido de compra informado pelo cliente.

      - name: account_number
        description: Número da conta do cliente.

      - name: order_date
        description: Data de criação do pedido.

      - name: due_date
        description: Data prevista para entrega.

      - name: ship_date
        description: Data de envio do pedido.

      - name: status
        description: Status atual do pedido.

      - name: online_order_flag
        description: Indica se o pedido foi realizado pela internet.

      - name: customer_id
        description: Identificador do cliente.

      - name: sales_person_id
        description: Identificador do vendedor responsável.

      - name: territory_id
        description: Identificador do território de vendas.

      - name: bill_to_address_id
        description: Identificador do endereço de faturamento.

      - name: ship_to_address_id
        description: Identificador do endereço de entrega.

      - name: ship_method_id
        description: Identificador do método de envio.

      - name: credit_card_id
        description: Identificador do cartão de crédito utilizado.

      - name: subtotal_amount
        description: Valor subtotal do pedido antes de impostos e frete.

      - name: tax_amount
        description: Valor total dos impostos do pedido.

      - name: freight_amount
        description: Valor do frete.

      - name: total_due_amount
        description: Valor total do pedido.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__special_offer
  # ==========================================================
  - name: stg_sales__special_offer
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      SpecialOffer da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: special_offer_id
        description: Identificador único da oferta.
        tests:
          - unique
          - not_null

      - name: description
        description: Descrição da oferta.

      - name: discount_pct
        description: Percentual de desconto aplicado.

      - name: offer_type
        description: Tipo da oferta.

      - name: offer_category
        description: Categoria da oferta.

      - name: start_date
        description: Data inicial de vigência da oferta.

      - name: end_date
        description: Data final de vigência da oferta.

      - name: min_qty
        description: Quantidade mínima para aplicação da oferta.

      - name: max_qty
        description: Quantidade máxima para aplicação da oferta.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__order_detail
  # ==========================================================
  - name: stg_sales__order_detail
    description: >
      Modelo de staging responsável por padronizar os dados dos itens dos
      pedidos de venda provenientes da tabela SalesOrderDetail da camada Bronze.

    columns:

      - name: sales_order_detail_id
        description: Identificador único do item do pedido.
        tests:
          - unique
          - not_null

      - name: sales_order_id
        description: Identificador do pedido de venda.
        tests:
          - not_null

      - name: carrier_tracking_number
        description: Número de rastreamento da transportadora.

      - name: product_id
        description: Identificador do produto vendido.
        tests:
          - not_null

      - name: special_offer_id
        description: Identificador da oferta promocional aplicada.

      - name: order_quantity
        description: Quantidade vendida do produto.
        tests:
          - not_null

      - name: unit_price_amount
        description: Preço unitário do produto.

      - name: unit_price_discount_amount
        description: Valor do desconto aplicado ao preço unitário.

      - name: line_total_amount
        description: Valor total da linha do pedido.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__customer
  # ==========================================================
  - name: stg_sales__customer
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      Customer da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: customer_id
        description: Identificador único do cliente.
        tests:
          - unique
          - not_null

      - name: person_id
        description: Identificador da pessoa associada ao cliente.

      - name: store_id
        description: Identificador da loja associada ao cliente.

      - name: territory_id
        description: Identificador do território de vendas.

      - name: account_number
        description: Número da conta do cliente.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__sales_reason
  # ==========================================================
  - name: stg_sales__sales_reason
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      SalesReason da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: sales_reason_id
        description: Identificador único do motivo da venda.
        tests:
          - unique
          - not_null

      - name: sales_reason_name
        description: Nome do motivo da venda.

      - name: reason_type
        description: Categoria do motivo da venda.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__order_header_sales_reason
  # ==========================================================
  - name: stg_sales__order_header_sales_reason
    description: >
      Modelo de staging responsável por padronizar os relacionamentos
      entre pedidos de venda e seus respectivos motivos.

      Esta é uma tabela associativa (bridge table) entre SalesOrderHeader
      e SalesReason.

    columns:

      - name: sales_order_id
        description: Identificador do pedido de venda.
        tests:
          - not_null

      - name: sales_reason_id
        description: Identificador do motivo da venda.
        tests:
          - not_null

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__special_offer_product
  # ==========================================================
  - name: stg_sales__special_offer_product
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      SpecialOfferProduct da camada Bronze.

      Esta tabela representa o relacionamento entre produtos e ofertas especiais.
      Nenhuma regra de negócio é aplicada nesta etapa.

    columns:

      - name: special_offer_id
        description: Identificador da oferta especial.
        tests:
          - not_null

      - name: product_id
        description: Identificador do produto.
        tests:
          - not_null

      - name: row_guid
        description: Identificador global único do relacionamento.

      - name: modified_date
        description: Data da última atualização do registro.
        
  # ==========================================================
  # stg_sales__store
  # ==========================================================
  - name: stg_sales__store
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      Store da camada Bronze.

      Esta tabela contém o cadastro das lojas (revendedores), incluindo o
      vendedor responsável e informações demográficas.

    columns:

      - name: business_entity_id
        description: Identificador da entidade de negócio da loja.
        tests:
          - unique
          - not_null

      - name: store_name
        description: Nome da loja.

      - name: sales_person_id
        description: Identificador do vendedor responsável pela loja.

      - name: demographics
        description: Informações demográficas da loja em formato XML.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__currency
  # ==========================================================
  - name: stg_sales__currency
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      Currency da camada Bronze.

      Esta tabela contém o cadastro das moedas utilizadas pelo AdventureWorks.

    columns:

      - name: currency_code
        description: Código ISO da moeda.
        tests:
          - unique
          - not_null

      - name: currency_name
        description: Nome da moeda.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__currency_rate
  # ==========================================================
  - name: stg_sales__currency_rate
    description:   
      Modelo de staging responsável por padronizar os dados da tabela
      CurrencyRate da camada Bronze.

      Esta tabela contém as taxas de câmbio utilizadas para conversão entre moedas.

    columns:
    
      - name: currency_rate_id
        description: Identificador único da taxa de câmbio.
        tests:
          - unique
          - not_null

      - name: currency_rate_date
        description: Data da cotação.

      - name: from_currency_code
        description: Código da moeda de origem.

      - name: to_currency_code
        description: Código da moeda de destino.

      - name: average_rate
        description: Taxa média de conversão.

      - name: end_of_day_rate
        description: Taxa de conversão no encerramento do dia.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__country_region_currency
  # ==========================================================
  - name: stg_sales__country_region_currency
    description: 
      Modelo de staging responsável por padronizar os dados da tabela
      CountryRegionCurrency da camada Bronze.

      Esta tabela relaciona cada país às moedas utilizadas.
    columns:

      - name: country_region_code
        description: Código do país.
        tests:
          - not_null

      - name: currency_code
        description: Código da moeda utilizada pelo país.
        tests:
          - not_null

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__credit_card
  # ==========================================================
  - name: stg_sales__credit_card
    description: >
      Modelo de staging responsável por padronizar os dados dos cartões
      de crédito utilizados nos pedidos de venda.

    columns:

      - name: credit_card_id
        description: Identificador único do cartão de crédito.
        tests:
          - unique
          - not_null

      - name: card_type
        description: Tipo do cartão de crédito.
        tests:
          - not_null

      - name: card_number
        description: Número do cartão de crédito.

      - name: expiration_month
        description: Mês de expiração do cartão.

      - name: expiration_year
        description: Ano de expiração do cartão.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__sales_person
  # ==========================================================
  - name: stg_sales__sales_person
    description: >
      Modelo de staging responsável por padronizar os dados dos
      vendedores da AdventureWorks.

    columns:

      - name: business_entity_id
        description: Identificador único do vendedor.
        tests:
          - unique
          - not_null

      - name: territory_id
        description: Identificador do território de vendas.

      - name: sales_quota
        description: Meta de vendas do vendedor.

      - name: bonus_amount
        description: Valor do bônus do vendedor.

      - name: commission_percentage
        description: Percentual de comissão.

      - name: sales_ytd_amount
        description: Valor acumulado de vendas no ano.

      - name: sales_last_year_amount
        description: Valor total vendido no ano anterior.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

  # ==========================================================
  # stg_sales__sales_territory
  # ==========================================================
  - name: stg_sales__sales_territory
    description: >
      Modelo de staging responsável por padronizar os dados dos
      territórios de vendas da AdventureWorks.

    columns:

      - name: territory_id
        description: Identificador único do território.
        tests:
          - unique
          - not_null

      - name: territory_name
        description: Nome do território de vendas.

      - name: country_region_code
        description: Código do país do território.

      - name: territory_group
        description: Grupo geográfico do território.

      - name: sales_ytd_amount
        description: Valor de vendas acumulado no ano.

      - name: sales_last_year_amount
        description: Valor de vendas do ano anterior.

      - name: cost_ytd_amount
        description: Custo acumulado no ano.

      - name: cost_last_year_amount
        description: Custo do ano anterior.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.