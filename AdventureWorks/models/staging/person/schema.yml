version: 2

models:

  # ==========================================================
  # stg_person__business_entity
  # ==========================================================
  - name: stg_person__business_entity

    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      BusinessEntity da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: business_entity_id
        description: Identificador único da entidade de negócio.
        tests:
          - unique
          - not_null

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.
  # ==========================================================
  # stg_person__person
  # ==========================================================
  - name: stg_person__person
    description: >
      Modelo de staging responsável por padronizar os dados da tabela
      Person da camada Bronze.

      Nesta etapa são realizadas apenas padronizações de nomenclatura das
      colunas utilizando snake_case. Nenhuma regra de negócio é aplicada.

    columns:

      - name: business_entity_id
        description: Identificador da entidade de negócio associada à pessoa.
        tests:
          - not_null

      - name: person_type
        description: Tipo de pessoa (GC, EM, SP, IN, SC ou VC).

      - name: name_style
        description: Indica o formato de apresentação do nome.

      - name: title
        description: Título da pessoa.

      - name: first_name
        description: Primeiro nome.

      - name: middle_name
        description: Nome do meio.

      - name: last_name
        description: Sobrenome.

      - name: suffix
        description: Sufixo do nome.

      - name: email_promotion
        description: Preferência para recebimento de promoções por e-mail.

      - name: additional_contact_info
        description: Informações adicionais de contato em formato XML.

      - name: demographics
        description: Informações demográficas em formato XML.

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
        description: Data da última atualização do registro.

