      - name: address_id
        description: Identificador do endereço.
        tests:
          - not_null

      - name: address_type_id
        description: Identificador do tipo de endereço.
        tests:
          - not_null

      - name: row_guid
        description: Identificador global único do registro.

      - name: modified_date
