version: 2

models:
  - name: int_person__customer
    description: >
      Consolida os dados dos clientes do AdventureWorks, unificando
      clientes pessoa física e clientes corporativos e enriquecendo
      os registros com informações de endereço e localização.

    columns:

      - name: customer_id
        description: Identificador único do cliente.
        data_tests:
          - unique
          - not_null

      - name: account_number
        description: Número da conta do cliente.

      - name: territory_id
        description: Identificador do território comercial.

      - name: person_id
        description: Identificador da pessoa física.

      - name: store_id
        description: Identificador da loja.

      - name: first_name
        description: Primeiro nome da pessoa.

      - name: middle_name
        description: Nome do meio da pessoa.

      - name: last_name
        description: Sobrenome da pessoa.

      - name: store_name
        description: Nome da loja.

      - name: address_line_1
        description: Primeira linha do endereço.

      - name: address_line_2
        description: Segunda linha do endereço.

      - name: city
        description: Cidade.

      - name: state_province_id
        description: Identificador do estado ou província.

      - name: postal_code
        description: CEP.

      - name: state_province_name
        description: Nome do estado ou província.

      - name: state_province_code
        description: Código do estado ou província.

      - name: country_region_name
        description: Nome do país.

      - name: country_region_code
        description: Código do país.