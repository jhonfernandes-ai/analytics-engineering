version: 2

models:
  # ==========================================
  # DIMENSÃO: CLIENTES (dim_customer)
  # ==========================================
  - name: dim_customer
    description: >
      Dimensão final de clientes para a camada Gold. Unifica clientes B2B (Lojas) 
      e B2C (Pessoas Físicas), consolida os dados de endereço e aplica regras de exibição para BI.
    
    columns:
      - name: customer_id
        description: "Identificador único do cliente (Chave Primária)."
        data_tests:
          - unique
          - not_null

      - name: account_number
        description: "Número da conta do cliente."

      - name: territory_id
        description: "Identificador do território comercial."

      - name: customer_type
        description: "Flag indicando se o cliente é Pessoa Física (B2C - Person) ou Loja (B2B - Store)."

      - name: customer_display_name
        description: "Nome principal de exibição no Dashboard (Nome da loja para B2B e Nome completo para B2C)."

      - name: person_id
        description: "Identificador da pessoa física."

      - name: first_name
        description: "Primeiro nome da pessoa."

      - name: middle_name
        description: "Nome do meio da pessoa."

      - name: last_name
        description: "Sobrenome da pessoa."

      - name: full_name
        description: "Nome completo do cliente (quando pessoa física)."

      - name: store_id
        description: "Identificador da loja."

      - name: store_name
        description: "Nome da loja comercial (quando cliente B2B)."

      - name: address_line_1
        description: "Primeira linha do endereço."

      - name: address_line_2
        description: "Segunda linha do endereço."

      - name: city
        description: "Cidade onde o cliente ou loja está localizado."

      - name: postal_code
        description: "CEP ou código postal."

      - name: state_name
        description: "Nome do estado ou província."

      - name: state_code
        description: "Código do estado ou província."

      - name: country_name
        description: "Nome do país (utilizado para filtros geográficos)."

      - name: country_code
        description: "Código do país."

  # ==========================================
  # DIMENSÃO: PRODUTOS (dim_product)
  # ==========================================
  - name: dim_product
    description: >
      Dimensão final de produtos para a camada Gold. Consolida a hierarquia do produto 
      (Categoria > Subcategoria > Modelo) e aplica tratamentos para valores nulos.
    
    columns:
      - name: product_id
        description: "Identificador único do produto (Chave Primária)."
        data_tests:
          - unique
          - not_null

      - name: product_number
        description: "Código comercial de identificação do produto."

      - name: product_name
        description: "Nome descritivo do produto."

      - name: category_name
        description: "Nome da categoria principal."

      - name: subcategory_name
        description: "Nome da subcategoria vinculada. Trata nulos com 'Sem Subcategoria'."

      - name: model_name
        description: "Nome do modelo do produto. Trata nulos com 'Sem Modelo'."

      - name: color
        description: "Cor do produto. Trata nulos com 'Não Especificado'."

      - name: size
        description: "Tamanho do produto."

      - name: product_line
        description: "Linha de produto (Ex: R=Road, M=Mountain, T=Touring, S=Standard)."

      - name: product_class
        description: "Classe do produto indicando o nível de qualidade (Ex: H=High, M=Medium, L=Low)."

      - name: style
        description: "Estilo do produto (Ex: W=Womens, M=Mens, U=Universal)."

      - name: standard_cost
        description: "Custo padrão do produto."

      - name: list_price
        description: "Preço de tabela sugerido para venda."

      - name: make_type
        description: "Tipo de processo de fabricação ou origem."

      - name: product_status
        description: "Status atual do produto."

      - name: product_description
        description: "Descrição detalhada do produto."

      - name: make_flag
        description: "Flag indicando se o produto é de fabricação própria. Valores nulos foram tratados como 'Não Informado'."

      - name: finished_goods_flag
        description: "Flag indicando se o produto é comercializável/acabado. Valores nulos foram tratados como 'Não Informado'."

  # ==========================================
  # DIMENSÃO: DATA (dim_date)
  # ==========================================
  - name: dim_date
    description: "Dimensão de calendário para suporte a análises temporais."
    columns:
      - name: date_sk
        description: "Chave substituta (Surrogate Key) para a data, geralmente no formato inteiro YYYYMMDD."
        data_tests:
          - unique
          - not_null
          
      - name: date_day
        description: "Data completa no formato nativo (DATE)."
        data_tests:
          - unique
          - not_null

      - name: year
        description: "Ano da data."

      - name: quarter
        description: "Trimestre do ano (1 a 4)."

      - name: month
        description: "Número do mês (1 a 12)."

      - name: month_name
        description: "Nome completo do mês."

      - name: month_name_short
        description: "Nome abreviado do mês."

      - name: day_of_month
        description: "Dia do mês (1 a 31)."

      - name: day_of_week
        description: "Dia da semana em formato numérico."

      - name: day_name
        description: "Nome do dia da semana."

      - name: is_weekend
        description: "Indicador booleano (True/False) se a data é um final de semana."

      - name: end_of_month
        description: "Data correspondente ao último dia do mês respectivo."

      - name: start_of_quarter
        description: "Timestamp de início do trimestre."

      - name: start_of_year
        description: "Timestamp de início do ano."